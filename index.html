<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Jean &amp; Chloé</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0c0a08;
      overflow: hidden;
    }

    #landing {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 0.4s ease;
    }
    #landing.hide {
      opacity: 0;
      pointer-events: none;
    }

    #landing p {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(1.4rem, 7vw, 2rem);
      color: rgba(240, 228, 210, 0.75);
      letter-spacing: 0.08em;
      text-align: center;
      padding: 0 32px;
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; }
      50%       { opacity: 1; }
    }

    #video-wrap {
      position: fixed;
      inset: 0;
      background: #000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    #video-wrap.show {
      opacity: 1;
      pointer-events: auto;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>
<body>

  <div id="landing" onclick="play()">
    <p>Ouvrez les portes</p>
  </div>

  <div id="video-wrap">
    <video
      id="v"
      src="VIDEO_FINALE.mp4"
      playsinline
      webkit-playsinline
      preload="metadata"
      disablePictureInPicture
    ></video>
  </div>

  <script>
    function play() {
      document.getElementById('landing').classList.add('hide');
      document.getElementById('video-wrap').classList.add('show');
      document.getElementById('v').play();
    }
  </script>

</body>
</html>
